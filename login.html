<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Admin login for R Pizza and More. Enter your credentials to access the dashboard." />
    <title>Admin Login | R Pizza and More</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--paper);
        padding: 24px;
        position: relative;
        overflow: hidden;
      }

      .login-page::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(ellipse at 30% 20%, rgba(217, 45, 32, 0.04) 0%, transparent 50%),
                    radial-gradient(ellipse at 70% 80%, rgba(255, 211, 107, 0.06) 0%, transparent 50%);
        animation: bgDrift 20s ease-in-out infinite alternate;
        pointer-events: none;
      }

      @keyframes bgDrift {
        0%   { transform: translate(0, 0) rotate(0deg); }
        100% { transform: translate(-3%, 2%) rotate(3deg); }
      }

      .login-card {
        background: var(--cream);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 40px 36px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06), 0 1px 3px rgba(0, 0, 0, 0.04);
        position: relative;
        z-index: 1;
        animation: cardEntry 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      @keyframes cardEntry {
        0% { opacity: 0; transform: translateY(30px) scale(0.96); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }

      .login-brand {
        text-align: center;
        margin-bottom: 32px;
      }

      .login-brand .brand-mark {
        width: 56px;
        height: 56px;
        font-size: 1.6rem;
        margin: 0 auto 12px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .login-brand h1 {
        font-size: 1.3rem;
        letter-spacing: 0.5px;
        margin: 0 0 4px;
        color: var(--ink);
      }

      .login-brand p {
        font-size: 0.85rem;
        color: var(--muted);
        margin: 0;
      }

      .login-tabs {
        display: flex;
        border-bottom: 2px solid var(--line);
        margin-bottom: 24px;
      }

      .login-tab {
        flex: 1;
        padding: 12px 0;
        text-align: center;
        font-weight: 850;
        font-size: 0.85rem;
        color: var(--muted);
        cursor: pointer;
        border: none;
        background: none;
        position: relative;
        transition: color 0.2s;
      }

      .login-tab.active {
        color: var(--tomato);
      }

      .login-tab.active::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--tomato);
        border-radius: 2px 2px 0 0;
      }

      .login-form {
        display: grid;
        gap: 16px;
      }

      .login-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .login-field label {
        font-size: 0.78rem;
        font-weight: 850;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .login-field input {
        min-height: 46px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-size: 0.95rem;
        font-family: inherit;
        background: var(--paper);
        color: var(--ink);
        transition: border-color 0.2s, box-shadow 0.2s;
        outline: none;
      }

      .login-field input:focus {
        border-color: var(--tomato);
        box-shadow: 0 0 0 3px rgba(217, 45, 32, 0.08);
      }

      .login-submit {
        min-height: 48px;
        background: var(--tomato);
        color: #fff;
        border: none;
        border-radius: 999px;
        font-size: 0.95rem;
        font-weight: 850;
        cursor: pointer;
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), 
                    background 0.2s ease, 
                    box-shadow 0.2s ease;
        box-shadow: 0 12px 28px rgba(217, 45, 32, 0.22);
        margin-top: 8px;
      }

      .login-submit:hover {
        transform: translateY(-2px);
      }

      .login-submit:active {
        transform: translateY(2px) scale(0.96);
        transition: transform 0.1s ease;
      }

      .login-submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .login-message {
        text-align: center;
        font-size: 0.85rem;
        font-weight: 600;
        padding: 10px 14px;
        border-radius: 8px;
        display: none;
      }

      .login-message.error {
        display: block;
        background: rgba(217, 45, 32, 0.08);
        color: var(--tomato-dark);
        border: 1px solid rgba(217, 45, 32, 0.15);
        animation: shake 0.4s ease;
      }

      .login-message.success {
        display: block;
        background: rgba(18, 128, 92, 0.08);
        color: var(--basil);
        border: 1px solid rgba(18, 128, 92, 0.15);
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20% { transform: translateX(-6px); }
        40% { transform: translateX(6px); }
        60% { transform: translateX(-4px); }
        80% { transform: translateX(4px); }
      }

      .login-footer {
        text-align: center;
        margin-top: 20px;
        font-size: 0.78rem;
        color: var(--muted);
      }

      .login-footer a {
        color: var(--tomato);
        text-decoration: underline;
        font-weight: 700;
      }

      .master-key-note {
        font-size: 0.78rem;
        color: var(--muted);
        text-align: center;
        line-height: 1.4;
        margin-top: 4px;
        padding: 8px 12px;
        background: rgba(255, 211, 107, 0.1);
        border-radius: 6px;
        border: 1px dashed rgba(255, 211, 107, 0.4);
      }

      .user-list {
        display: grid;
        gap: 8px;
        margin-top: 16px;
      }

      .user-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 8px;
        animation: cardEntry 0.3s ease;
      }

      .user-item-info {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .user-item-info strong {
        font-size: 0.9rem;
        color: var(--ink);
      }

      .user-item-info small {
        font-size: 0.72rem;
        color: var(--muted);
      }

      .user-delete-btn {
        min-height: 32px;
        padding: 0 14px;
        border: 1px solid var(--tomato);
        background: transparent;
        color: var(--tomato-dark);
        border-radius: 6px;
        font-size: 0.78rem;
        font-weight: 850;
        cursor: pointer;
        transition: background 0.2s, color 0.2s, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .user-delete-btn:hover {
        background: var(--tomato);
        color: #fff;
        transform: translateY(-2px);
      }

      .user-delete-btn:active {
        transform: translateY(2px) scale(0.95);
        transition: transform 0.1s ease;
      }

      .user-list-empty {
        text-align: center;
        padding: 20px;
        color: var(--muted);
        font-size: 0.85rem;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="login-page">
      <div class="login-card">
        <div class="login-brand">
          <span class="brand-mark">R</span>
          <h1>R PIZZA AND MORE</h1>
          <p>Admin Portal · Tajpur, Samastipur</p>
        </div>

        <div class="login-tabs">
          <button class="login-tab active" id="tab-login" type="button">Sign In</button>
          <button class="login-tab" id="tab-register" type="button">Add User</button>
          <button class="login-tab" id="tab-manage" type="button">Manage</button>
        </div>

        <div id="login-message" class="login-message"></div>

        <!-- LOGIN FORM -->
        <form class="login-form" id="login-form">
          <div class="login-field">
            <label for="login-username">Username</label>
            <input id="login-username" type="text" placeholder="Enter your username" autocomplete="username" required />
          </div>
          <div class="login-field">
            <label for="login-password">Password</label>
            <input id="login-password" type="password" placeholder="Enter your password" autocomplete="current-password" required />
          </div>
          <button class="login-submit" type="submit" id="login-btn">Sign In</button>
        </form>

        <form class="login-form" id="register-form" style="display: none;">
          <div class="login-field">
            <label for="reg-master-key">Master Key</label>
            <input id="reg-master-key" type="password" placeholder="Enter the master key" required />
          </div>
          <div class="login-field">
            <label for="reg-role">Role</label>
            <select id="reg-role" style="min-height:46px;padding:0 14px;border:1px solid var(--line);border-radius:8px;font-size:0.95rem;font-family:inherit;background:var(--paper);color:var(--ink);">
              <option value="admin">Admin</option>
              <option value="delivery">Delivery Partner</option>
            </select>
          </div>
          <div class="login-field">
            <label for="reg-username">New Username</label>
            <input id="reg-username" type="text" placeholder="Choose a username" autocomplete="off" required minlength="3" />
          </div>
          <div class="login-field">
            <label for="reg-password">New Password</label>
            <input id="reg-password" type="password" placeholder="Choose a password" autocomplete="new-password" required minlength="4" />
          </div>
          <p class="master-key-note">You need the master key from the admin owner to create a new account.</p>
          <button class="login-submit" type="submit" id="register-btn">Create Account</button>
        </form>

        <!-- MANAGE USERS FORM -->
        <div class="login-form" id="manage-form" style="display: none;">
          <div class="login-field">
            <label for="manage-master-key">Master Key</label>
            <input id="manage-master-key" type="password" placeholder="Enter the master key" />
          </div>
          <button class="login-submit" type="button" id="load-users-btn">Load Users</button>
          <p class="master-key-note">Enter the master key to view and remove admin users.</p>
          <div id="user-list-container"></div>
        </div>

        <div class="login-footer">
          <a href="index.html">← Back to website</a>
        </div>
      </div>
    </div>

    <script>
      const AUTH_API = "/api/auth";
      const SESSION_KEY = "r-pizza-admin-session";

      const tabLogin = document.getElementById("tab-login");
      const tabRegister = document.getElementById("tab-register");
      const tabManage = document.getElementById("tab-manage");
      const loginForm = document.getElementById("login-form");
      const registerForm = document.getElementById("register-form");
      const manageForm = document.getElementById("manage-form");
      const msgBox = document.getElementById("login-message");

      // Check if already logged in
      (async function checkSession() {
        const token = localStorage.getItem(SESSION_KEY);
        if (!token) return;
        try {
          const res = await fetch(AUTH_API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "verify", token }),
          });
          const data = await res.json();
          if (data.valid) {
            window.location.href = data.role === "delivery" ? "delivery.html" : "admin.html";
          }
        } catch {
          // Ignore, show login
        }
      })();

      function setActiveTab(activeTab) {
        [tabLogin, tabRegister, tabManage].forEach(t => t.classList.remove("active"));
        activeTab.classList.add("active");
        loginForm.style.display = activeTab === tabLogin ? "grid" : "none";
        registerForm.style.display = activeTab === tabRegister ? "grid" : "none";
        manageForm.style.display = activeTab === tabManage ? "grid" : "none";
        hideMessage();
      }

      tabLogin.addEventListener("click", () => setActiveTab(tabLogin));
      tabRegister.addEventListener("click", () => setActiveTab(tabRegister));
      tabManage.addEventListener("click", () => setActiveTab(tabManage));

      function showMessage(text, type) {
        msgBox.textContent = text;
        msgBox.className = `login-message ${type}`;
      }

      function hideMessage() {
        msgBox.className = "login-message";
        msgBox.textContent = "";
      }

      // LOGIN
      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("login-btn");
        btn.disabled = true;
        btn.textContent = "Signing in...";
        hideMessage();

        const username = document.getElementById("login-username").value.trim();
        const password = document.getElementById("login-password").value;

        try {
          const res = await fetch(AUTH_API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "login", username, password }),
          });
          const data = await res.json();

          if (!res.ok) {
            showMessage(data.message || "Login failed", "error");
            btn.disabled = false;
            btn.textContent = "Sign In";
            return;
          }

          localStorage.setItem(SESSION_KEY, data.token);
          localStorage.setItem("r-pizza-admin-role", data.role || "admin");
          localStorage.setItem("r-pizza-admin-username", data.username);
          showMessage("Login successful! Redirecting...", "success");
          setTimeout(() => {
            window.location.href = data.role === "delivery" ? "delivery.html" : "admin.html";
          }, 600);
        } catch (err) {
          showMessage("Network error. Please try again.", "error");
          btn.disabled = false;
          btn.textContent = "Sign In";
        }
      });

      // REGISTER
      registerForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("register-btn");
        btn.disabled = true;
        btn.textContent = "Creating...";
        hideMessage();

        const masterKey = document.getElementById("reg-master-key").value;
        const username = document.getElementById("reg-username").value.trim();
        const password = document.getElementById("reg-password").value;

        try {
          const res = await fetch(AUTH_API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "register", masterKey, username, password, role: document.getElementById("reg-role").value }),
          });
          const data = await res.json();

          if (!res.ok) {
            showMessage(data.message || "Registration failed", "error");
            btn.disabled = false;
            btn.textContent = "Create Account";
            return;
          }

          showMessage("Account created! You can now sign in.", "success");
          registerForm.reset();
          btn.disabled = false;
          btn.textContent = "Create Account";

          // Auto-switch to login tab after 1.5s
          setTimeout(() => {
            tabLogin.click();
          }, 1500);
        } catch (err) {
          showMessage("Network error. Please try again.", "error");
          btn.disabled = false;
          btn.textContent = "Create Account";
        }
      });

      // MANAGE USERS
      const loadUsersBtn = document.getElementById("load-users-btn");
      const userListContainer = document.getElementById("user-list-container");

      loadUsersBtn.addEventListener("click", async () => {
        const masterKey = document.getElementById("manage-master-key").value;
        if (!masterKey) {
          showMessage("Enter the master key first", "error");
          return;
        }

        loadUsersBtn.disabled = true;
        loadUsersBtn.textContent = "Loading...";
        hideMessage();

        try {
          const res = await fetch(AUTH_API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "list", masterKey }),
          });
          const data = await res.json();

          if (!res.ok) {
            showMessage(data.message || "Failed to load users", "error");
            loadUsersBtn.disabled = false;
            loadUsersBtn.textContent = "Load Users";
            return;
          }

          renderUserList(data.users, masterKey);
          loadUsersBtn.disabled = false;
          loadUsersBtn.textContent = "Refresh List";
        } catch {
          showMessage("Network error. Please try again.", "error");
          loadUsersBtn.disabled = false;
          loadUsersBtn.textContent = "Load Users";
        }
      });

      function renderUserList(users, masterKey) {
        if (!users || users.length === 0) {
          userListContainer.innerHTML = `<div class="user-list-empty">No admin users found. Add one from the "Add User" tab.</div>`;
          return;
        }

        userListContainer.innerHTML = `
          <div class="user-list">
            ${users.map(u => `
              <div class="user-item">
                <div class="user-item-info">
                  <strong>${u.username} <span style="font-size:0.68rem;padding:2px 8px;border-radius:999px;font-weight:900;margin-left:6px;${u.role === 'delivery' ? 'background:rgba(121,40,202,0.1);color:#7928ca;' : 'background:rgba(18,128,92,0.1);color:var(--basil);'}">${u.role === 'delivery' ? 'Delivery' : 'Admin'}</span></strong>
                  <small>Added ${new Date(u.createdAt).toLocaleDateString()}</small>
                </div>
                <button class="user-delete-btn" data-username="${u.username}" type="button">Remove</button>
              </div>
            `).join("")}
          </div>
        `;

        // Attach delete handlers
        userListContainer.querySelectorAll(".user-delete-btn").forEach(btn => {
          btn.addEventListener("click", async () => {
            const username = btn.dataset.username;
            if (!confirm(`Are you sure you want to remove "${username}"? They will be logged out immediately.`)) return;

            btn.disabled = true;
            btn.textContent = "Removing...";

            try {
              const res = await fetch(AUTH_API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: "delete", masterKey, username }),
              });
              const data = await res.json();

              if (!res.ok) {
                showMessage(data.message || "Failed to remove user", "error");
                btn.disabled = false;
                btn.textContent = "Remove";
                return;
              }

              showMessage(data.message, "success");
              // Re-fetch the list
              loadUsersBtn.click();
            } catch {
              showMessage("Network error. Please try again.", "error");
              btn.disabled = false;
              btn.textContent = "Remove";
            }
          });
        });
      }
    </script>
  </body>
</html>
